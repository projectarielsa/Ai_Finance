version: '3.8'

services:
  app-prod:
    build:
      context: .
      dockerfile: Dockerfile
    image: finance-ai-app:latest
    container_name: finance_prod_app
    restart: always
    ports:
      - "8010:80"
    # KUNCI PERBAIKAN 1: Suntikkan .env langsung sebagai environment sistem, bukan lewat volume mount
    env_file:
      - .env
    volumes:
      - storage_prod:/var/www/html/storage
    networks:
      - shared_network

networks:
  shared_network:
    name: shared
    external: true

volumes:
  storage_prod: