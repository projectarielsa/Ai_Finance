version: '3.8'

services:
  app-staging:
    build:
      context: .
      dockerfile: Dockerfile
    image: finance-ai-app:staging
    container_name: finance-staging_app
    restart: always
    ports:
      - "8010:80"
    # KUNCI PERBAIKAN: Hapus mounting .env dan file yang bisa merusak isi kontainer
    volumes:
      - /srv/apps/finance-staging/.env:/var/www/html/.env # Mount .env eksternal tetap aman
      - storage_staging:/var/www/html/storage            # Cukup share storage untuk upload file
    networks:
      - shared_network

networks:
  shared_network:
    name: shared
    external: true

volumes:
  storage_staging: