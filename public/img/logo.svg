<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Background circle with gradient -->
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="coin-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
  </defs>
  
  <!-- Main rounded square background -->
  <rect x="2" y="2" width="44" height="44" rx="12" fill="url(#bg-grad)"/>
  
  <!-- Chart bars representing finance -->
  <rect x="10" y="28" width="5" height="12" rx="2" fill="rgba(255,255,255,0.9)"/>
  <rect x="17" y="22" width="5" height="18" rx="2" fill="rgba(255,255,255,0.9)"/>
  <rect x="24" y="16" width="5" height="24" rx="2" fill="rgba(255,255,255,0.9)"/>
  
  <!-- AI sparkle/brain icon -->
  <circle cx="36" cy="16" r="7" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.9)" stroke-width="1.5"/>
  <path d="M33 16 L35 14 L36 16.5 L38 15 L37 17 L39 17.5 L37 18.5 L38 20 L36 18.5 L35 20 L34.5 18 L33 18.5Z" fill="#fbbf24"/>
  
  <!-- Upward trend line -->
  <path d="M10 34 Q18 30 24 26 T38 14" stroke="#22c55e" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.8"/>
  <circle cx="38" cy="14" r="2" fill="#22c55e" opacity="0.8"/>
</svg>
