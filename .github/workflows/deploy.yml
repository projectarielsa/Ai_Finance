name: Deploy Finance AI

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /www/wwwroot/finance-ai

            sudo chown -R ubuntu:ubuntu .

            git fetch origin
            git reset --hard origin/main

            composer install --no-dev --optimize-autoloader

            if [ -f package.json ]; then
              npm install
              npm run build
            fi

            php artisan migrate --force
            php artisan optimize:clear
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

            sudo mkdir -p storage/logs bootstrap/cache public/uploads
            sudo touch storage/logs/laravel.log

            sudo chown -R www:www storage bootstrap/cache public/uploads
            sudo chmod -R 775 storage bootstrap/cache public/uploads
            sudo chmod 664 storage/logs/laravel.log
